services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
      POSTGRES_DB: benchmark
    ports:
      - "55432:5432"
    volumes:
      - benchmark-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark"]
      interval: 2s
      timeout: 3s
      retries: 20

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://benchmark:benchmark@db:5432/benchmark
      EVALUATOR_BACKEND: modal
      BENCHMARK_MANIFEST_DIR: benchmark/manifests
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID:-}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  benchmark-postgres:
