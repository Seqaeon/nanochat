name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cli-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.5"
          enable-cache: true
      - run: scripts/ci.sh cli-and-package

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.5"
          enable-cache: true
      - run: scripts/ci.sh benchmark
