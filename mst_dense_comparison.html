const MST_VARIANTS = [
  // A clean, bright sky blue for MicroAttn
  { id:'micro_attn_d8', label:'MicroAttn d8',   total:57677840, active:57677840, flops:2.454036e8, bpp:1.0358508491364813, color:'#3CAEA3' }, 
  { id:'micro_attn_d16', label:'MicroAttn d16',   total:190849056, active:190849056, flops:9.437676e8, bpp:0.8752039886704976, color:'#3CAEA3' }, 
  
  // Keep your rich purple for AggDist
  { id:'aggdist_d8', label:'AggDist d8',   total:57677840, active:57677840, flops:2.454036e8, bpp:1.0433, color:'#7E53D4' }, 
  { id:'aggdist_d16', label:'AggDist d16',   total:190865440, active:190865440, flops:9.438659e8, bpp:0.8730348203279754, color:'#7E53D4' }, 
  
  // Keep your vibrant pink-magenta for FFA
  { id:'ffa_d8', label:'FFA d8',total:57165840, active:57165840, flops:2.423316e8, bpp:1.058885, color:'#D4537E' },
  { id:'ffa_d16', label:'FFA d16',total:186720288, active:186720288, flops:9.189949e8, bpp:0.907685, color:'#D4537E' },
];

const M = v => v / 1e6;

function buildLegend(elId, variants) {
  const el = document.getElementById(elId);
  const baseItem = `<span class="leg-item"><svg width="22" height="8" viewBox="0 0 22 8"><line x1="0" y1="4" x2="22" y2="4" stroke="#888780" stroke-width="1.5" stroke-dasharray="4,3"/></svg>Dense baseline (power fit)</span>`;
  const items = variants.map(v =>
    `<span class="leg-item"><svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4.5" fill="${v.color}"/></svg>${v.label}</span>`
  ).join('');
  el.innerHTML = baseItem + items;
}

// Fit power law: bpp = a * x^b  (OLS in log-log space)
function fitPowerLaw(keyFn, data) {
  const valid = (data || DENSE).filter(d => keyFn(d) > 0 && d.bpp > 0);
  const lx = valid.map(d => Math.log(keyFn(d)));
  const ly = valid.map(d => Math.log(d.bpp));
  const n = lx.length;
  const mx = lx.reduce((s,v) => s+v, 0) / n;
  const my = ly.reduce((s,v) => s+v, 0) / n;
  const cov  = lx.reduce((s,v,i) => s + (v-mx)*(ly[i]-my), 0);
  const varx = lx.reduce((s,v)   => s + (v-mx)**2, 0);
  const b = cov / varx;
  const a = Math.exp(my - b * mx);
  // R² goodness of fit
  const ssres = valid.reduce((s,d,i) => s + (ly[i] - Math.log(a) - b * lx[i])**2, 0);
  const sstot = ly.reduce((s,v) => s + (v - my)**2, 0);
  const r2 = 1 - ssres / sstot;
  return { a, b, r2 };
}

// Extrapolated power-law curve — extends ±40% of the log range beyond the data
function baseCurveDS(keyFn, variants) {
  const allX = [...DENSE, ...(variants||[])].map(keyFn).filter(v => v > 0);
  const xMin = Math.min(...allX);
  const xMax = Math.max(...allX);
  const logSpan = Math.log(xMax / xMin);
  const pad = 0.4;
  const x0 = xMin * Math.exp(-pad * logSpan);
  const x1 = xMax * Math.exp( pad * logSpan);
  const { a, b } = fitPowerLaw(keyFn);
  const N = 100;
  const pts = Array.from({length: N}, (_, i) => {
    const x = x0 * Math.pow(x1/x0, i/(N-1));
    return { x: M(x), y: a * Math.pow(x, b) };
  });
  return {
    label: 'Dense baseline (power fit)',
    data: pts,
    showLine: true, tension: 0,
    borderColor: '#888780', backgroundColor: 'transparent',
    borderWidth: 1.5, borderDash: [5,3],
    pointRadius: 0, pointHoverRadius: 0,
    order: 10,
  };
}

// Power-law fit curve for a variant (e.g. AggDist)
function variantCurveDS(keyFn, variantData, color, label) {
  if (variantData.length < 2) return null; // need at least 2 points for a fit
  const { a, b, r2 } = fitPowerLaw(keyFn, variantData);
  const allX = variantData.map(keyFn).filter(v => v > 0);
  const xMin = Math.min(...allX);
  const xMax = Math.max(...allX);
  const logSpan = Math.log(xMax / xMin);
  const pad = 0.6; // extend a bit further for extrapolation visibility
  const x0 = xMin * Math.exp(-pad * logSpan);
  const x1 = xMax * Math.exp( pad * logSpan);
  const N = 80;
  const pts = Array.from({length: N}, (_, i) => {
    const x = x0 * Math.pow(x1/x0, i/(N-1));
    return { x: M(x), y: a * Math.pow(x, b) };
  });
  return {
    label: `${label} (power fit)`,
    data: pts,
    showLine: true, tension: 0,
    borderColor: color, backgroundColor: 'transparent',
    borderWidth: 1.5, borderDash: [3,2],
    pointRadius: 0, pointHoverRadius: 0,
    order: 8,
    _fit: { a, b, r2 },
  };
}

// Actual DENSE data points (small dots, no line)
function baseDotDS(keyFn) {
  const pts = [...DENSE].sort((a,b) => keyFn(a)-keyFn(b)).map(d => ({ x: M(keyFn(d)), y: d.bpp }));
  return {
    label: 'Dense (measured)',
    data: pts,
    showLine: false,
    backgroundColor: '#888780', borderColor: '#888780',
    pointStyle: 'circle', pointRadius: 3.5, pointHoverRadius: 5,
    order: 9,
  };
}

function varDS(v, keyFn) {
  return {
    label: v.label,
    data: [{ x: M(keyFn(v)), y: v.bpp, id: v.id }],
    backgroundColor: v.color, borderColor: v.color,
    pointStyle: 'circle', pointRadius: 7, pointHoverRadius: 9,
    pointBorderColor: 'rgba(255,255,255,0.5)', pointBorderWidth: 1.5,
    order: 1,
  };
}

function makeChart(canvasId, variants, keyFn, xLabel) {
  // 1. Initialize datasets with the Dense baseline curve and dots, plus individual points
  const datasets = [
    baseCurveDS(keyFn, variants), 
    baseDotDS(keyFn), 
    ...variants.map(v => varDS(v, keyFn))
  ];
  
  // 2. Dynamically group variants by their base prefix (e.g., 'aggdist', 'micro_attn', 'ffa')
  const groups = {};
  variants.forEach(v => {
    // Splits 'micro_attn_d8' into ['micro', 'attn', 'd8'] and grabs the core prefix group
    const baseGroup = v.id.replace(/_d\d+$/, ''); 
    if (!groups[baseGroup]) {
      groups[baseGroup] = {
        data: [],
        color: v.color,
        label: v.label.split(' ')[0] // Captures 'MicroAttn', 'AggDist', or 'FFA'
      };
    }
    groups[baseGroup].data.push(v);
  });

  // 3. Loop through every variant group and calculate/push its respective power-law curve
  Object.keys(groups).forEach(groupKey => {
    const group = groups[groupKey];
    const curve = variantCurveDS(keyFn, group.data, group.color, group.label);
    if (curve) {
      datasets.push(curve);
      
      // Keep your summary text info updated for the first chart layout
      if (canvasId === 'mst-c1' && groupKey === 'aggdist') {
        const fit = curve._fit;
        const infoEl = document.getElementById('fit-info');
        const { a: da, b: db, r2: dr2 } = fitPowerLaw(keyFn);
        infoEl.innerHTML = `Dense fit: bpp = ${da.toFixed(4)} × N<sup>${db.toFixed(4)}</sup> (R²=${dr2.toFixed(4)}) &nbsp;|&nbsp; AggDist fit: bpp = ${fit.a.toFixed(4)} × N<sup>${fit.b.toFixed(4)}</sup> (R²=${fit.r2.toFixed(4)})`;
      }
    }
  });
  
  // 4. Render the chart config
  new Chart(document.getElementById(canvasId), {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top:6, right:6 } },
      scales: {
        x: {
          type: 'logarithmic',
          title: { display: false },
          ticks: {
            font:{ size:9 }, color:'#888780', maxTicksLimit:5,
            callback(v) {
              const m = v/1e6;
              const nice = [10,20,30,40,50,80,100,200,300,500,700,1000];
              const r = Math.round(m);
              if (nice.includes(r) && Math.abs(m-r)/r < 0.015) return r>=1000 ? (r/1000)+'B' : r+'M';
              return null;
            }
          },
          grid: { color:'rgba(136,135,128,0.1)' },
        },
        y: {
          ticks: { font:{size:9}, color:'#888780', callback: v => v.toFixed(2) },
          grid: { color:'rgba(136,135,128,0.1)' },
          min: 0.50, max: 1.22,
        },
      },
      plugins: {
        legend: { display:false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const r = ctx.raw;
              const name = r.id ? `[${r.id}] ` : '';
              return `${name}${ctx.dataset.label}: (${r.x.toFixed(1)}M, ${r.y.toFixed(4)} bpp)`;
            }
          }
        }
      }
    }
  });
}
buildLegend('leg-mst', MST_VARIANTS);

makeChart('mst-c1', MST_VARIANTS, d=>d.total,  'total params');
makeChart('mst-c2', MST_VARIANTS, d=>d.active, 'active params');
makeChart('mst-c3', MST_VARIANTS, d=>d.flops,  'active FLOPs');
